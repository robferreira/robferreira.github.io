<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <pattern id="dots" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#60a5fa" opacity="0.25"/>
    </pattern>
    <radialGradient id="vignette" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a0f1e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0f1e" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="#0a0f1e"/>
  <rect width="1920" height="1080" fill="url(#accentGlow)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <g opacity="0.15" stroke="#38bdf8" stroke-width="0.8" fill="none">
    <line x1="200" y1="300" x2="500" y2="200"/>
    <line x1="500" y1="200" x2="800" y2="350"/>
    <line x1="800" y1="350" x2="1100" y2="250"/>
    <line x1="1100" y1="250" x2="1400" y2="400"/>
    <line x1="1400" y1="400" x2="1700" y2="300"/>
    <line x1="300" y1="700" x2="600" y2="600"/>
    <line x1="600" y1="600" x2="900" y2="750"/>
    <line x1="900" y1="750" x2="1200" y2="650"/>
    <line x1="1200" y1="650" x2="1500" y2="800"/>
    <circle cx="500" cy="200" r="3" fill="#60a5fa"/>
    <circle cx="800" cy="350" r="3" fill="#60a5fa"/>
    <circle cx="1100" cy="250" r="3" fill="#60a5fa"/>
    <circle cx="1400" cy="400" r="3" fill="#60a5fa"/>
    <circle cx="600" cy="600" r="3" fill="#60a5fa"/>
    <circle cx="900" cy="750" r="3" fill="#60a5fa"/>
    <circle cx="1200" cy="650" r="3" fill="#60a5fa"/>
  </g>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
