name: Update Medium posts

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: update-medium-posts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-posts:
    runs-on: ubuntu-latest
    # Evita loop: o próprio commit do bot não precisa disparar outro fetch
    if: >-
      github.event_name != 'push' ||
      github.event.head_commit.author.name != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Medium RSS
        run: npm run fetch:medium

      - name: Commit updated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/medium-posts.json js/blog/posts-data.js
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update Medium posts"
            git pull --rebase origin master
            git push origin HEAD:master
          fi
